name: "Workflow 2 — Foundation Setup"
description: >
  Scaffold the React 18 project alongside the Angular app, set up single-spa bridge,
  shared types, design tokens, auth bridge, and CI pipeline.

phase: 1 — Foundation
duration: 1-2 weeks
repeat: false

inputs:
  migration_plan: "docs/migration_plan.md"
  component_inventory: "assessment/component_inventory.csv"
  dependency_map: "assessment/dependency-map.csv"
  performance_baseline: "assessment/performance_baseline.md"
  angular_styles: "src/styles.scss"
  coexistence_strategy: "single-spa"

outputs:
  - react_project: "react-app/ (Vite + React 18 + TypeScript)"
  - shared_types_package: "packages/shared-types/"
  - coexistence_bridge: "single-spa root config"
  - design_tokens: "react-app/src/styles/tokens.css"
  - auth_bridge: "react-app/src/providers/AuthProvider.tsx"
  - ci_pipeline: ".github/workflows/ci.yml"

steps:
  - id: scaffold-react
    name: "Scaffold React Project"
    description: >
      Create React 18 project with Vite, TypeScript strict mode, path aliases.
    commands:
      - "npm create vite@latest react-app -- --template react-ts"
      - "cd react-app && npm install"
      - "Configure tsconfig.json with strict: true, path aliases (@/)"
    acceptance_criteria:
      - React 18.3.x installed
      - Vite 5.x configured
      - TypeScript strict mode enabled
      - Path aliases working (@/components, @/hooks, @/types, etc.)
      - Dev server starts without errors

  - id: install-dependencies
    name: "Install React Dependencies"
    description: >
      Install all React ecosystem dependencies identified in the migration plan.
    packages:
      production:
        - "react-router-dom@^6.20"
        - "@tanstack/react-query@^5"
        - "zustand@^4"
        - "react-hook-form@^7"
        - "zod@^3"
        - "@hookform/resolvers@^3"
        - "chart.js@^3.7.0"
        - "react-chartjs-2@^5"
      development:
        - "vitest@^1"
        - "@testing-library/react@^14"
        - "@testing-library/jest-dom@^6"
        - "@testing-library/user-event@^14"
        - "playwright@^1"
        - "msw@^2"
        - "@axe-core/react@^4"
        - "vite-plugin-checker@^0.6"
    acceptance_criteria:
      - All packages installed without conflicts
      - No duplicate React versions
      - Bundle size within 200KB of Angular baseline

  - id: shared-types
    name: "Extract Shared Types Package"
    description: >
      Copy TypeScript interfaces and enums from Angular models to a shared package
      that both Angular and React can consume.
    source_files:
      - "src/app/shared/models/loan.model.ts → packages/shared-types/loan.ts"
      - "src/app/shared/models/user.model.ts → packages/shared-types/user.ts"
    types_to_extract:
      - "Loan, LoanType, LoanStatus, LoanApplication, PersonalInfo, EmploymentInfo"
      - "LoanDetails, DocumentInfo, LoanCalculation, AmortizationEntry, DashboardStats"
      - "User"
      - "Notification (from notification.service.ts)"
    acceptance_criteria:
      - All 12 interfaces/enums extracted
      - Both Angular and React import from shared package
      - No type duplication

  - id: design-tokens
    name: "Migrate HSBC Design Tokens"
    description: >
      Convert SCSS variables from styles.scss to CSS custom properties.
    token_mapping:
      "$hsbc-red: #DB0011": "--hsbc-red: #DB0011"
      "$hsbc-red-dark: #AF000D": "--hsbc-red-dark: #AF000D"
      "$hsbc-red-light: #FF1A2C": "--hsbc-red-light: #FF1A2C"
      "$hsbc-black: #333333": "--hsbc-black: #333333"
      "$hsbc-dark-gray: #575757": "--hsbc-dark-gray: #575757"
      "$hsbc-medium-gray: #767676": "--hsbc-medium-gray: #767676"
      "$hsbc-light-gray: #D7D8D6": "--hsbc-light-gray: #D7D8D6"
      "$hsbc-pale-gray: #F3F3F3": "--hsbc-pale-gray: #F3F3F3"
      "$hsbc-white: #FFFFFF": "--hsbc-white: #FFFFFF"
      "$hsbc-success: #00847F": "--hsbc-success: #00847F"
      "$hsbc-warning: #F2A900": "--hsbc-warning: #F2A900"
      "$hsbc-error: #DB0011": "--hsbc-error: #DB0011"
      "$hsbc-info: #0073CF": "--hsbc-info: #0073CF"
    acceptance_criteria:
      - All 13 color tokens migrated
      - All spacing tokens migrated ($spacing-xs through $spacing-xxl)
      - All typography tokens migrated
      - All shadow tokens migrated
      - Visual diff shows zero regression

  - id: auth-bridge
    name: "Implement Auth Bridge"
    description: >
      Create AuthProvider that shares auth state with Angular via localStorage.
      Both Angular AuthService and React useAuth read/write the same 'hsbc_auth' key.
    angular_contract:
      storage_key: "hsbc_auth"
      check_on_init: "localStorage.getItem('hsbc_auth')"
      set_on_login: "localStorage.setItem('hsbc_auth', 'true')"
      clear_on_logout: "localStorage.removeItem('hsbc_auth')"
    react_implementation:
      provider: "AuthProvider.tsx"
      hook: "useAuth.ts"
      context_value: "{ user, isAuthenticated, login, logout }"
    acceptance_criteria:
      - Login in Angular → React reads auth state correctly
      - Login in React → Angular reads auth state correctly
      - Logout in either framework clears state in both
      - No auth flicker during navigation

  - id: router-setup
    name: "Configure React Router"
    description: >
      Set up React Router 6 with the same URL structure as Angular.
    routes:
      - { path: "/login", component: "LoginPage", auth: false, lazy: true }
      - { path: "/dashboard", component: "DashboardPage", auth: true, lazy: true }
      - { path: "/loan-application", component: "LoanApplicationPage", auth: true, lazy: true }
      - { path: "/loan-calculator", component: "LoanCalculatorPage", auth: true, lazy: true }
      - { path: "/loan-status", component: "LoanStatusPage", auth: true, lazy: true }
      - { path: "/profile", component: "ProfilePage", auth: true, lazy: true }
      - { path: "/", redirect: "/login" }
      - { path: "*", redirect: "/login" }
    acceptance_criteria:
      - All 6 routes accessible
      - Auth guard redirects to /login when not authenticated
      - Lazy loading working (separate chunks per route)
      - URL structure identical to Angular app

  - id: mock-api
    name: "Set Up MSW Mock API"
    description: >
      Replicate Angular's in-memory mock data as MSW handlers.
    handlers:
      - "POST /api/auth/login → mock user (James Chen)"
      - "GET /api/loans → 5 mock loans"
      - "GET /api/loans/:id → single loan"
      - "GET /api/dashboard/stats → dashboard stats"
      - "POST /api/loans/apply → create loan"
      - "POST /api/loans/calculate → amortization calculation"
    acceptance_criteria:
      - All mock handlers return same data as Angular services
      - MSW active in development and test environments
      - API contract documented in OpenAPI format

  - id: ci-pipeline
    name: "Configure CI Pipeline"
    description: >
      GitHub Actions workflow for build, test, lint, and performance checks.
    jobs:
      - "lint: ESLint + Prettier check"
      - "typecheck: tsc --noEmit"
      - "unit-test: vitest run --coverage"
      - "build: vite build"
      - "bundle-size: compare against baseline"
      - "lighthouse: performance audit"
    acceptance_criteria:
      - CI runs on every PR
      - All jobs pass on clean React scaffold
      - Coverage thresholds configured
      - Bundle size check configured

  - id: single-spa-setup
    name: "Configure single-spa Bridge"
    description: >
      Set up single-spa root config to mount Angular and React apps side by side.
    acceptance_criteria:
      - Angular app mounts at all current routes
      - React app mounts behind feature flags
      - Route-level switching works via feature flags
      - No JavaScript conflicts between frameworks
      - Shared dependencies (zone.js awareness) handled

  - id: foundation-validation
    name: "Validate Foundation"
    description: >
      End-to-end validation that the foundation is solid before starting migration.
    acceptance_criteria:
      - React dev server starts without errors
      - All routes render placeholder components
      - Auth bridge works bidirectionally
      - Design tokens render correctly
      - CI pipeline passes
      - Lighthouse baseline captured for React shell
