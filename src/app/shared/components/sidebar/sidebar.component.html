<nav class="sidebar" [class.collapsed]="isCollapsed">
  <div class="sidebar-content">
    <ul class="nav-list">
      <li *ngFor="let item of navItems" class="nav-item" [class.active]="isActive(item.route)">
        <a [routerLink]="item.route" class="nav-link" [matTooltip]="isCollapsed ? item.label : ''" matTooltipPosition="right">
          <mat-icon class="nav-icon">{{ item.icon }}</mat-icon>
          <span class="nav-label" *ngIf="!isCollapsed">{{ item.label }}</span>
          <span class="nav-badge" *ngIf="item.badge && !isCollapsed">{{ item.badge }}</span>
        </a>
      </li>
    </ul>
  </div>

  <div class="sidebar-footer" *ngIf="!isCollapsed">
    <div class="help-card">
      <mat-icon>support_agent</mat-icon>
      <div class="help-text">
        <strong>Need Help?</strong>
        <p>Contact our loan specialists</p>
      </div>
      <a href="tel:+448001234567" class="help-link">0800 123 4567</a>
    </div>
  </div>
</nav>
