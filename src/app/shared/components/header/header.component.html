<header class="hsbc-header">
  <div class="header-left">
    <button class="menu-toggle" (click)="onToggleSidebar()">
      <mat-icon>menu</mat-icon>
    </button>
    <div class="logo-container" routerLink="/dashboard">
      <div class="hsbc-logo">
        <svg viewBox="0 0 120 32" class="logo-svg">
          <rect x="0" y="0" width="15" height="15" fill="#DB0011"/>
          <rect x="17" y="0" width="15" height="15" fill="#DB0011"/>
          <rect x="0" y="17" width="15" height="15" fill="#DB0011"/>
          <rect x="17" y="17" width="15" height="15" fill="#DB0011"/>
          <polygon points="0,0 15,7.5 0,15" fill="#FFFFFF"/>
          <polygon points="32,0 17,7.5 32,15" fill="#FFFFFF"/>
          <polygon points="0,17 15,24.5 0,32" fill="#FFFFFF"/>
          <polygon points="32,17 17,24.5 32,32" fill="#FFFFFF"/>
          <text x="40" y="22" fill="#DB0011" font-family="Univers, Helvetica, Arial, sans-serif" font-size="20" font-weight="bold">HSBC</text>
        </svg>
      </div>
      <span class="app-title">Loans Portal</span>
    </div>
  </div>

  <div class="header-right" *ngIf="currentUser">
    <div class="notification-wrapper">
      <button class="icon-btn" (click)="toggleNotificationsPanel()" [matBadge]="unreadCount > 0 ? unreadCount : ''" matBadgeColor="warn" matBadgeSize="small">
        <mat-icon>notifications_none</mat-icon>
      </button>

      <div class="notifications-panel" *ngIf="showNotifications">
        <div class="panel-header">
          <h4>Notifications</h4>
          <button class="btn-text" (click)="markAllRead()">Mark all read</button>
        </div>
        <div class="panel-body">
          <div *ngFor="let notification of notifications" class="notification-item" [class.unread]="!notification.read">
            <mat-icon [class]="'notif-icon ' + notification.type">{{ getNotificationIcon(notification.type) }}</mat-icon>
            <div class="notif-content">
              <strong>{{ notification.title }}</strong>
              <p>{{ notification.message }}</p>
              <span class="notif-time">{{ notification.timestamp | date:'MMM d, h:mm a' }}</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="user-menu">
      <button class="user-btn" [matMenuTriggerFor]="userMenu">
        <div class="user-avatar">{{ currentUser.firstName.charAt(0) }}{{ currentUser.lastName.charAt(0) }}</div>
        <div class="user-info">
          <span class="user-name">{{ currentUser.firstName }} {{ currentUser.lastName }}</span>
          <span class="user-role">{{ currentUser.role }}</span>
        </div>
        <mat-icon>expand_more</mat-icon>
      </button>
      <mat-menu #userMenu="matMenu">
        <button mat-menu-item routerLink="/profile">
          <mat-icon>person</mat-icon>
          <span>My Profile</span>
        </button>
        <button mat-menu-item>
          <mat-icon>settings</mat-icon>
          <span>Settings</span>
        </button>
        <button mat-menu-item>
          <mat-icon>help_outline</mat-icon>
          <span>Help & Support</span>
        </button>
        <mat-divider></mat-divider>
        <button mat-menu-item (click)="logout()">
          <mat-icon>logout</mat-icon>
          <span>Sign Out</span>
        </button>
      </mat-menu>
    </div>
  </div>
</header>
